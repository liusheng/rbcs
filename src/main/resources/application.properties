spring.application.name=rbcs
aliyun.accessKeyId=your-access-key-id
aliyun.accessKeySecret=your-access-key-secret
aliyun.regionId=your-region-id

spring.datasource.url=jdbc:mysql://172.29.33.213:3306/rbcs
spring.datasource.username=rbcs
spring.datasource.password=rbcs
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=HikariCP
spring.datasource.hikari.max-lifetime=2000000
spring.datasource.hikari.connection-timeout=30000

# Flyway ??
flyway.baseline-on-migrate=true
flyway.locations=classpath:/db/migration
